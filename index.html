<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Rutes Emparellades: Importa els teus mapes de paper i navega amb GPS en temps real">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
  <title>Rutes Emparellades</title>
</head>
<body>
  <!-- Video per a la Càmera Guia en segon pla -->
  <video id="camera-preview" autoplay playsinline class="hidden"></video>

  <!-- Contenidor del mapa Leaflet -->
  <div id="map-container"></div>

  <!-- Brúixola indicadora superior esquerra -->
  <div id="compass-indicator" class="hidden">
    <div class="compass-rose">🧭</div>
  </div>

  <!-- Barra d'estat offline -->
  <div id="offline-badge" class="hidden">Mode Offline</div>

  <!-- Estadístiques de ruta gravant -->
  <div id="stats-bar" class="hidden">
    <div class="stat-item">
      <span class="stat-label">Distància</span>
      <span id="stat-distance">0 m</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Durada</span>
      <span id="stat-duration">00:00</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Velocitat</span>
      <span id="stat-speed">0.0 km/h</span>
    </div>
  </div>

  <!-- Barra d'eines d'alineació (flotant superior) -->
  <div id="align-toolbar" class="hidden">
    <div class="align-toolbar-row">
      <span class="align-title">Alineació Visual</span>
      <input type="range" id="opacity-slider" min="0" max="100" value="60" title="Opacitat del mapa importat">
    </div>
    <div class="align-toolbar-row buttons">
      <button id="nudge-left" class="align-btn" title="Nudge Esquerra">←</button>
      <button id="nudge-up" class="align-btn" title="Nudge Dalt">↑</button>
      <button id="nudge-down" class="align-btn" title="Nudge Baix">↓</button>
      <button id="nudge-right" class="align-btn" title="Nudge Dreta">→</button>
      <span class="divider"></span>
      <button id="btn-scale-down" class="align-btn" title="Reduir Mida">➖</button>
      <button id="btn-scale-up" class="align-btn" title="Augmentar Mida">➕</button>
      <button id="btn-rotate-ccw" class="align-btn" title="Rotar Antihorari">🔄</button>
      <button id="btn-rotate-cw" class="align-btn" title="Rotar Horari">🔁</button>
    </div>
    <div class="align-toolbar-row modes">
      <button id="btn-perspective" class="mode-btn" title="Corregir Perspectiva">📐 Perspectiva</button>
      <button id="btn-controlpoints" class="mode-btn" title="Punts de Control">📍 Punts de Control</button>
      <button id="btn-align-confirm" class="action-btn confirm" title="Confirmar">✅ D'acord</button>
      <button id="btn-align-cancel" class="action-btn cancel" title="Cancel·lar">❌ Cancel·lar</button>
    </div>
  </div>

  <!-- Barra d'eines principal (flotant inferior) -->
  <div id="toolbar">
    <button id="btn-import" class="toolbar-btn" title="Importar mapa">📷</button>
    <button id="btn-align" class="toolbar-btn disabled" disabled title="Alinear mapa">📐</button>
    <button id="btn-gps" class="toolbar-btn" title="Centrar al GPS">📍</button>
    <button id="btn-record" class="toolbar-btn" title="Gravar ruta">⏺️</button>
    <button id="btn-compass" class="toolbar-btn" title="Toggle brúixola/rotació">🧭</button>
    <button id="btn-menu" class="toolbar-btn" title="Menú">☰</button>
  </div>

  <!-- Barra d'eines per a la Càmera Guia (flotant inferior) -->
  <div id="camera-guide-controls" class="hidden">
    <div class="camera-guide-row">
      <span class="camera-guide-title">Opacitat del Mapa</span>
      <input type="range" id="camera-opacity-slider" min="0" max="100" value="50" title="Opacitat del mapa digital de guia">
    </div>
    <div class="camera-guide-buttons">
      <button id="btn-camera-capture" class="camera-action-btn capture" title="Capturar i alinear exactament">📷 Capturar i Alinear</button>
      <button id="btn-camera-cancel" class="camera-action-btn cancel" title="Tancar càmera guia">❌ Cancel·lar</button>
    </div>
  </div>

  <!-- Menú lateral (Sidebar) -->
  <div id="sidebar" class="hidden">
    <div class="sidebar-header">
      <h2>Rutes Emparellades</h2>
      <button id="btn-close-sidebar" class="close-btn">×</button>
    </div>
    <div class="sidebar-content">
      <div class="sidebar-section">
        <h3>Mapes Guardats</h3>
        <ul id="saved-maps-list" class="item-list">
          <li class="empty-list-msg">No hi ha cap mapa guardat.</li>
        </ul>
      </div>
      <div class="sidebar-section">
        <h3>Rutes Enregistrades</h3>
        <ul id="saved-routes-list" class="item-list">
          <li class="empty-list-msg">No hi ha cap ruta guardada.</li>
        </ul>
      </div>
      <div class="sidebar-section settings">
        <h3>Configuració</h3>
        <div class="setting-item">
          <label for="setting-rotate-map">Rotar mapa amb la brúixola</label>
          <input type="checkbox" id="setting-rotate-map">
        </div>
        <div class="setting-item">
          <label for="setting-high-accuracy">Alta precisió GPS forçada</label>
          <input type="checkbox" id="setting-high-accuracy" checked>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay de diàlegs modals -->
  <div id="modal-overlay" class="hidden"></div>

  <!-- Contenidor per a Toasts (notificacions emergents) -->
  <div id="toast-container"></div>

  <!-- Llibreries locals -->
  <script src="lib/leaflet.js"></script>
  <script src="lib/leaflet-imageoverlay-rotated.js"></script>

  <!-- Scripts modulars de l'aplicació -->
  <script src="js/storage.js"></script>
  <script src="js/map.js"></script>
  <script src="js/importer.js"></script>
  <script src="js/aligner.js"></script>
  <script src="js/control-points.js"></script>
  <script src="js/gps-tracker.js"></script>
  <script src="js/compass.js"></script>
  <script src="js/camera-guide.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
